<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CI/CD Dashboard</title>

  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; }
    header { background: #1f3c88; color: white; padding: 15px; text-align: center; }

    .container { width: 90%; margin: 20px auto; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; }

    input { padding: 8px; margin: 5px; width: 250px; }

    button { padding: 10px; margin: 5px; cursor: pointer; }

    .status { padding: 5px 10px; border-radius: 5px; }
    .success { background: #d4edda; }
    .failed { background: #f8d7da; }
    .running { background: #d1ecf1; }
    .pending { background: #fff3cd; }

    .log-box {
      background: black;
      color: #00ff99;
      padding: 10px;
      min-height: 150px;
      font-family: monospace;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<header>
  <h1>CI/CD Automation Dashboard</h1>
</header>

<div class="container">

  <!-- CREATE PIPELINE -->
  <div class="card">
    <h2>Create Pipeline</h2>

    <input id="name" placeholder="Pipeline Name"><br>
    <input id="repo" placeholder="Repo URL"><br>
    <input id="build" placeholder="Build Command"><br>
    <input id="test" placeholder="Test Command"><br>

    <button onclick="createPipeline()">Create Pipeline</button>
    <button onclick="runPipeline()">Run Pipeline</button>
    <button onclick="retryPipeline()">Retry Pipeline</button>
    <button onclick="getPipelines()">Get Pipelines</button>
    <br><br>
    <div id="pipelineTable"></div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h2>Status</h2>
    <p>Build: <span id="buildStatus" class="status pending">Pending</span></p>
    <p>Test: <span id="testStatus" class="status pending">Pending</span></p>
    <p>Deploy: <span id="deployStatus" class="status pending">Pending</span></p>
  </div>

  <!-- LOGS -->
  <div class="card">
    <h2>Logs</h2>
    <div id="logBox" class="log-box"></div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="card">
    <h2>Notifications</h2>
    <ul id="notifications"></ul>
  </div>

</div>

<script>
let currentPipelineId = null;

// -------- UTIL -------- //

function log(msg) {
  document.getElementById("logBox").textContent += msg + "\n";
}

function notify(msg) {
  const li = document.createElement("li");
  li.textContent = msg;
  document.getElementById("notifications").appendChild(li);
}

function setStatus(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "status " + cls;
}

// -------- CREATE PIPELINE -------- //

async function createPipeline() {

  const data = {
    name: document.getElementById("name").value,
    repoUrl: document.getElementById("repo").value,
    buildCommand: document.getElementById("build").value,
    testCommand: document.getElementById("test").value
  };

  if (!data.name || !data.repoUrl) {
    alert("Name and Repo URL required");
    return;
  }

  const res = await fetch("/pipeline", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  currentPipelineId = result.id;

  notify("Pipeline created: " + currentPipelineId);
  log("[INFO] Pipeline created");
}

// -------- RUN PIPELINE -------- //

async function runPipeline() {

  if (!currentPipelineId) {
    alert("Create pipeline first!");
    return;
  }

  setStatus("buildStatus", "Running", "running");
  setStatus("testStatus", "Pending", "pending");
  setStatus("deployStatus", "Pending", "pending");

  log("[INFO] Pipeline execution started...");

  const res = await fetch(`/run/${currentPipelineId}`, {
    method: "POST"
  });

  const data = await res.json();

  // -------- SUCCESS --------
  if (data.status === "SUCCESS") {

    setStatus("buildStatus", "Success", "success");
    setStatus("testStatus", "Success", "success");
    setStatus("deployStatus", "Success", "success");

    log("[SUCCESS] Pipeline completed");

    if (data.logs) {
      data.logs.forEach(l => log(l));
    }

    notify("Pipeline SUCCESS");
  }

  // -------- FAILURE --------
  else {

    if (data.stage === "CLONE") {
      setStatus("buildStatus", "Failed", "failed");
    }

    if (data.stage === "BUILD") {
      setStatus("buildStatus", "Failed", "failed");
    }

    if (data.stage === "TEST") {
      setStatus("buildStatus", "Success", "success");
      setStatus("testStatus", "Failed", "failed");
    }

    log(`[ERROR] ${data.stage} failed`);

    if (data.logs) {
      data.logs.forEach(l => log(l));
    }

    if (data.fixCommand) {
      log("[AI] Suggested Fix: " + data.fixCommand);
      notify("AI Suggestion available. Click Retry.");
    } else {
      notify("Pipeline FAILED (No automatic fix available)");
    }
  }
}

async function retryPipeline() {

  if (!currentPipelineId) {
    alert("Run a pipeline first!");
    return;
  }

  log("[INFO] Retrying pipeline...");

  const res = await fetch(`/retry/${currentPipelineId}`, {
    method: "POST"
  });

  const data = await res.json();

  setStatus("buildStatus", "Running", "running");
  setStatus("testStatus", "Pending", "pending");
  setStatus("deployStatus", "Pending", "pending");

  if (data.status === "SUCCESS") {

    setStatus("buildStatus", "Success", "success");
    setStatus("testStatus", "Success", "success");
    setStatus("deployStatus", "Success", "success");

    log("[SUCCESS] Retry successful");

    if (data.logs) {
      data.logs.forEach(l => log(l));
    }

    notify("Pipeline RECOVERED");
  }

  else {

    log(`[ERROR] Retry failed at ${data.stage}`);

    if (data.logs) {
      data.logs.forEach(l => log(l));
    }

    notify("Retry FAILED");
  }
}

async function getPipelines() {
    const res = await fetch('/pipelines');
    const data = await res.json();

    let html = `
        <table border="1" cellpadding="8">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
            </tr>
    `;

    if (data.length === 0) {
        html += `<tr><td colspan="3">No pipelines found</td></tr>`;
    } else {
        data.forEach(p => {
            html += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.status}</td>
                </tr>
            `;
        });
    }

    html += "</table>";

    document.getElementById("pipelineTable").innerHTML = html;
}

</script>

</body>
</html>
