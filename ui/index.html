<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CI/CD Automation Dashboard</title>

  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f9; }
    header { background: #1f3c88; color: white; padding: 20px; text-align: center; }

    .container { width: 90%; margin: 20px auto; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; }

    .status { padding: 5px 10px; border-radius: 5px; }
    .success { background: #d4edda; }
    .failed { background: #f8d7da; }
    .running { background: #d1ecf1; }
    .pending { background: #fff3cd; }

    button { padding: 10px; margin: 5px; cursor: pointer; }

    .log-box {
      background: black;
      color: #00ff99;
      padding: 10px;
      min-height: 120px;
      font-family: monospace;
    }
  </style>
</head>

<body>

<header>
  <h1>CI/CD Automation Dashboard</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Pipeline Controls</h2>
    <button onclick="createPipeline()">Create Pipeline</button>
    <button onclick="runPipeline()">Run Pipeline</button>
  </div>

  <div class="card">
    <h2>Status</h2>
    <p>Build: <span id="buildStatus" class="status pending">Pending</span></p>
    <p>Test: <span id="testStatus" class="status pending">Pending</span></p>
    <p>Deploy: <span id="deployStatus" class="status pending">Pending</span></p>
  </div>

  <div class="card">
    <h2>Logs</h2>
    <div id="logBox" class="log-box"></div>
  </div>

  <div class="card">
    <h2>Notifications</h2>
    <ul id="notifications"></ul>
  </div>

</div>

<script>
let currentPipelineId = null;

// Utility functions
function log(msg) {
  document.getElementById("logBox").textContent += msg + "\n";
}

function notify(msg) {
  const li = document.createElement("li");
  li.textContent = msg;
  document.getElementById("notifications").appendChild(li);
}

function setStatus(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "status " + cls;
}

// Create Pipeline
async function createPipeline() {
  const res = await fetch("http://localhost:3000/pipeline", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name: "UI Pipeline" })
  });

  const data = await res.json();
  currentPipelineId = data.id;

  notify("Pipeline created with ID: " + currentPipelineId);
  log("[INFO] Pipeline created");
}

// Run Pipeline
async function runPipeline() {

  if (!currentPipelineId) {
    alert("Create pipeline first!");
    return;
  }

  setStatus("buildStatus", "Running", "running");
  setStatus("testStatus", "Pending", "pending");
  setStatus("deployStatus", "Pending", "pending");

  log("[INFO] Pipeline started");

  const res = await fetch(`http://localhost:3000/run/${currentPipelineId}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      buildStatus: "Success",
      testStatus: Math.random() > 0.5 ? "Success" : "Fail"
    })
  });

  const data = await res.json();

  if (data.result === "Deploy") {
    setStatus("buildStatus", "Success", "success");
    setStatus("testStatus", "Success", "success");
    setStatus("deployStatus", "Success", "success");

    log("[SUCCESS] Pipeline completed successfully");
    notify("Pipeline SUCCESS");
  } else {
    setStatus("buildStatus", "Success", "success");
    setStatus("testStatus", "Failed", "failed");

    log("[ERROR] Test failed → Pipeline stopped");
    notify("Pipeline FAILED");
  }
}
</script>

</body>
</html>
